<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAD Diagram Analyzer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #232636;
      --border: #2e3248;
      --accent: #5b7ffa;
      --accent-hover: #7a99ff;
      --text: #e2e4f0;
      --text-muted: #7b80a0;
      --success: #4caf7d;
      --error: #f06269;
      --radius: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 80px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }
    header h1 {
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    header p {
      margin-top: 6px;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      width: 100%;
      max-width: 720px;
    }

    /* ── Drop zone ── */
    #drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    #drop-zone:hover, #drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(91,127,250,0.05);
    }
    #drop-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .drop-icon { font-size: 2.4rem; margin-bottom: 10px; }
    .drop-label { font-size: 1rem; font-weight: 500; }
    .drop-hint  { font-size: 0.82rem; color: var(--text-muted); margin-top: 4px; }

    /* ── Preview ── */
    #preview-wrap {
      display: none;
      margin-top: 20px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
    }
    #preview-img {
      width: 100%;
      max-height: 360px;
      object-fit: contain;
      background: #0a0b10;
      display: block;
    }
    #preview-name {
      font-size: 0.8rem;
      color: var(--text-muted);
      padding: 6px 12px;
      background: var(--surface2);
    }
    #clear-btn {
      position: absolute; top: 8px; right: 8px;
      background: rgba(0,0,0,0.6); border: none; color: #fff;
      border-radius: 50%; width: 26px; height: 26px;
      cursor: pointer; font-size: 0.85rem; display: flex;
      align-items: center; justify-content: center;
    }

    /* ── Query ── */
    .section-label {
      font-size: 0.82rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin: 24px 0 8px;
    }

    textarea#query {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.95rem;
      padding: 12px 14px;
      resize: vertical;
      min-height: 80px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    textarea#query::placeholder { color: var(--text-muted); }
    textarea#query:focus { border-color: var(--accent); }

    /* ── Analyze button ── */
    #analyze-btn {
      margin-top: 20px;
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      padding: 13px;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }
    #analyze-btn:hover:not(:disabled) { background: var(--accent-hover); }
    #analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Status / spinner ── */
    #status {
      display: none;
      align-items: center;
      gap: 10px;
      margin-top: 18px;
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Results ── */
    #results-card {
      display: none;
      margin-top: 24px;
    }

    .result-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .badge {
      font-size: 0.75rem;
      padding: 3px 10px;
      border-radius: 99px;
      border: 1px solid var(--border);
      color: var(--text-muted);
      background: var(--surface2);
      font-family: monospace;
    }
    .badge.success { border-color: var(--success); color: var(--success); }
    .badge.error   { border-color: var(--error);   color: var(--error);   }

    #result-text {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      font-size: 0.9rem;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 520px;
      overflow-y: auto;
    }

    .step-indicator {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
    }
    .step {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .step.active { color: var(--accent); }
    .step.done   { color: var(--success); }
    .step-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: currentColor;
    }
    .step-sep { color: var(--border); }
  </style>
</head>
<body>

<header>
  <h1>CAD Diagram Analyzer</h1>
  <p>Upload an electrical schematic or P&amp;ID and ask the agent questions about it</p>
</header>

<div class="card">
  <!-- Drop zone -->
  <div id="drop-zone">
    <input type="file" id="file-input" accept="image/*,.tif,.tiff" />
    <div class="drop-icon">🗂️</div>
    <div class="drop-label">Drop a diagram here or click to browse</div>
    <div class="drop-hint">PNG, JPEG, TIFF supported</div>
  </div>

  <!-- Image preview -->
  <div id="preview-wrap">
    <img id="preview-img" alt="Preview" />
    <button id="clear-btn" title="Remove">✕</button>
    <div id="preview-name"></div>
  </div>

  <!-- Query -->
  <div class="section-label">Your question</div>
  <textarea id="query" placeholder="e.g. What components are present? List all valves. Identify the main power supply path.">What components are present in this diagram?</textarea>

  <!-- Submit -->
  <button id="analyze-btn" disabled>Analyze Diagram</button>

  <!-- Status -->
  <div id="status">
    <div class="spinner"></div>
    <span id="status-text">Uploading…</span>
  </div>
</div>

<!-- Results -->
<div class="card" id="results-card">
  <div class="step-indicator">
    <div class="step done" id="step-ingest"><div class="step-dot"></div>Ingested</div>
    <div class="step-sep">›</div>
    <div class="step" id="step-analyze"><div class="step-dot"></div>Analyzed</div>
  </div>
  <div class="result-meta" id="result-meta"></div>
  <div id="result-text"></div>
</div>

<script>
  const API = '';   // same origin; change to e.g. "http://localhost:8080" if opening as file://

  const dropZone    = document.getElementById('drop-zone');
  const fileInput   = document.getElementById('file-input');
  const previewWrap = document.getElementById('preview-wrap');
  const previewImg  = document.getElementById('preview-img');
  const previewName = document.getElementById('preview-name');
  const clearBtn    = document.getElementById('clear-btn');
  const queryTA     = document.getElementById('query');
  const analyzeBtn  = document.getElementById('analyze-btn');
  const statusEl    = document.getElementById('status');
  const statusText  = document.getElementById('status-text');
  const resultsCard = document.getElementById('results-card');
  const resultMeta  = document.getElementById('result-meta');
  const resultText  = document.getElementById('result-text');
  const stepIngest  = document.getElementById('step-ingest');
  const stepAnalyze = document.getElementById('step-analyze');

  let selectedFile = null;

  // ── Drag & drop ──────────────────────────────────────────────────────────
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f) setFile(f);
  });
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) setFile(fileInput.files[0]); });

  function setFile(f) {
    selectedFile = f;
    const url = URL.createObjectURL(f);
    previewImg.src = url;
    previewName.textContent = `${f.name}  (${(f.size / 1024).toFixed(1)} KB)`;
    previewWrap.style.display = 'block';
    analyzeBtn.disabled = false;
    resultsCard.style.display = 'none';
  }

  clearBtn.addEventListener('click', () => {
    selectedFile = null;
    fileInput.value = '';
    previewWrap.style.display = 'none';
    analyzeBtn.disabled = true;
    resultsCard.style.display = 'none';
  });

  // ── Analyze flow ─────────────────────────────────────────────────────────
  analyzeBtn.addEventListener('click', async () => {
    if (!selectedFile) return;
    const query = queryTA.value.trim();
    if (!query) { queryTA.focus(); return; }

    setLoading(true, 'Uploading and ingesting diagram…');
    resetResults();

    // Step 1 — ingest
    let diagramId;
    try {
      const form = new FormData();
      form.append('file', selectedFile);
      const res = await fetch(`${API}/ingest`, { method: 'POST', body: form });
      if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
      const data = await res.json();
      if (!data.success) throw new Error(data.error_message || 'Ingestion failed');
      diagramId = data.diagram_id;
    } catch (err) {
      setLoading(false);
      showError('Ingestion failed', err.message);
      return;
    }

    markStep(stepIngest, 'done');
    markStep(stepAnalyze, 'active');
    setStatus('Analyzing with AI agent…');

    // Step 2 — analyze
    try {
      const res = await fetch(`${API}/analyze`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ diagram_id: diagramId, query, user_id: 'ui-user' }),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
      const data = await res.json();
      setLoading(false);
      showResult(diagramId, data.response);
    } catch (err) {
      setLoading(false);
      showError('Analysis failed', err.message);
    }
  });

  // ── Helpers ───────────────────────────────────────────────────────────────
  function setLoading(active, text = '') {
    analyzeBtn.disabled = active;
    statusEl.style.display = active ? 'flex' : 'none';
    if (text) statusText.textContent = text;
    if (active) resultsCard.style.display = 'block';
  }

  function setStatus(text) { statusText.textContent = text; }

  function resetResults() {
    resultMeta.innerHTML = '';
    resultText.textContent = '';
    markStep(stepIngest, '');
    markStep(stepAnalyze, '');
    resultsCard.style.display = 'none';
  }

  function markStep(el, state) {
    el.classList.remove('active', 'done');
    if (state) el.classList.add(state);
  }

  function showResult(diagramId, text) {
    markStep(stepAnalyze, 'done');
    resultsCard.style.display = 'block';
    resultMeta.innerHTML = `
      <span class="badge success">✓ Analysis complete</span>
      <span class="badge">${diagramId}</span>
      <a href="${API}/visualization/${diagramId}" target="_blank"
         style="margin-left:8px;color:var(--accent);font-size:0.85rem;">
         Open Interactive Visualization →</a>
    `;
    resultText.textContent = text;
  }

  function showError(title, detail) {
    resultsCard.style.display = 'block';
    resultMeta.innerHTML = `<span class="badge error">✕ ${title}</span>`;
    resultText.textContent = detail;
  }
</script>
</body>
</html>
